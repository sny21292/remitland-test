# Docker Compose - runs the full RemitLand stack on AWS EC2
#
# Services:
#   1. backend    - Laravel PHP API (port 8000)
#   2. frontend   - Next.js React app (port 3000)
#   3. socket     - Socket.IO real-time server (port 6001)
#   4. redis      - Caching + pub/sub
#   5. queue      - Laravel queue worker (processes queued transactions)
#   6. nginx      - Reverse proxy (port 80)
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f        # Watch logs
#   docker-compose down           # Stop all services

version: "3.8"

services:
  # ── Redis ──
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── Laravel Backend API ──
  backend:
    build:
      context: ./remitland-backend
      dockerfile: Dockerfile
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=${SUPABASE_DB_HOST:-aws-1-ap-south-1.pooler.supabase.com}
      - DB_PORT=${SUPABASE_DB_PORT:-5432}
      - DB_DATABASE=${SUPABASE_DB_NAME:-postgres}
      - DB_USERNAME=${SUPABASE_DB_USER:-postgres.jhbbbtcprdypwdwpttyn}
      - DB_PASSWORD=${SUPABASE_DB_PASSWORD:-fruits4lifeA@123}
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=database
      - SOCKET_SERVER_URL=http://socket:6001
    depends_on:
      - redis
    restart: unless-stopped

  # ── Queue Worker (processes queued transactions) ──
  queue:
    build:
      context: ./remitland-backend
      dockerfile: Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=${SUPABASE_DB_HOST:-aws-1-ap-south-1.pooler.supabase.com}
      - DB_PORT=${SUPABASE_DB_PORT:-5432}
      - DB_DATABASE=${SUPABASE_DB_NAME:-postgres}
      - DB_USERNAME=${SUPABASE_DB_USER:-postgres.jhbbbtcprdypwdwpttyn}
      - DB_PASSWORD=${SUPABASE_DB_PASSWORD:-fruits4lifeA@123}
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=database
      - SOCKET_SERVER_URL=http://socket:6001
    depends_on:
      - redis
    restart: unless-stopped

  # ── Socket.IO Server ──
  socket:
    build:
      context: ./remitland-backend
      dockerfile: Dockerfile.socket
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./remitland-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://remitland.duckdns.org/api
        - NEXT_PUBLIC_SOCKET_URL=https://remitland.duckdns.org
    depends_on:
      - backend
      - socket
    restart: unless-stopped

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
      - socket
    restart: unless-stopped

volumes:
  redis_data:
